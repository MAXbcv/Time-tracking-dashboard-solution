<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Time tracking dashboard</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    
    <main class="container">
      <div class="raport">
        <div class="infos-raport">
          <img
            src="./images/image-jeremy.png"
            alt="jeremy"
            class="image-jeremy"
          />
          <div class="profil">
            <p>Report for</p>
            <h1 class="">Jeremy Robson</h1>
          </div>
        </div>
        <div class="timeframes">
          <button class="timeframe isactive" data-timeframe=0>daily</button>
          <button class="timeframe" data-timeframe=1>weekly</button>
          <button class="timeframe" data-timeframe=2>monthly</button>
        </div>
      </div>
      <div class="container-items"></div>
    </main>                                                                                                                                                                                                       
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
    <script src="./main.js"></script>
  </body>
</html>
